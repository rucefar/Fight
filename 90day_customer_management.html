<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>90天客戶跟進管理系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f4f0;
    --bg-card: #ffffff;
    --bg-secondary: #f0eeea;
    --text-primary: #1a1a1a;
    --text-secondary: #5c5b57;
    --text-tertiary: #9c9b97;
    --border: rgba(0,0,0,0.10);
    --border-strong: rgba(0,0,0,0.18);
    --blue: #1a5fb4;
    --blue-light: #e8f0fb;
    --green: #0e7d5a;
    --green-light: #e0f5ee;
    --amber: #a05c00;
    --amber-light: #fdf0d8;
    --red: #b03030;
    --red-light: #fdeaea;
    --stage1: #1a5fb4;
    --stage2: #0e7d5a;
    --stage3: #a05c00;
    --radius: 14px;
    --radius-sm: 8px;
    --shadow: 0 2px 8px rgba(0,0,0,0.06);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.10);
  }
  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* HEADER */
  .app-header {
    background: var(--bg-card);
    border-bottom: 1px solid var(--border);
    padding: 0 28px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 50;
    box-shadow: var(--shadow);
  }
  .app-logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .app-logo .dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: linear-gradient(135deg, var(--stage1), var(--stage3));
  }
  .app-logo h1 { font-size: 15px; font-weight: 700; letter-spacing: -0.02em; }
  .header-actions { display: flex; gap: 8px; align-items: center; }
  .stats-pill {
    font-size: 12px;
    color: var(--text-tertiary);
    background: var(--bg-secondary);
    padding: 4px 12px;
    border-radius: 99px;
    border: 1px solid var(--border);
  }

  /* PAGE CONTAINER */
  .page { display: none; }
  .page.active { display: block; }
  .list-content { max-width: 1100px; margin: 0 auto; padding: 28px 20px; }

  /* SEARCH + ACTIONS */
  .toolbar {
    display: flex; gap: 10px; margin-bottom: 28px; align-items: center;
  }
  .search-wrap {
    flex: 1; position: relative;
  }
  .search-wrap svg {
    position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    width: 15px; height: 15px; color: var(--text-tertiary);
  }
  .search-input {
    width: 100%;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 9px 14px 9px 36px;
    font-size: 13px;
    color: var(--text-primary);
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .search-input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(26,95,180,0.10); }
  .btn-add {
    display: flex; align-items: center; gap: 6px;
    background: var(--text-primary);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    padding: 9px 18px;
    font-size: 13px;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    transition: opacity 0.15s;
    white-space: nowrap;
  }
  .btn-add:hover { opacity: 0.85; }

  /* STAGE BLOCKS */
  .stage-block { margin-bottom: 36px; }
  .stage-header {
    display: flex; align-items: center; gap: 12px; margin-bottom: 14px;
  }
  .stage-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 99px;
    border: 1.5px solid;
  }
  .s1 .stage-label { color: var(--stage1); border-color: var(--stage1); background: var(--blue-light); }
  .s2 .stage-label { color: var(--stage2); border-color: var(--stage2); background: var(--green-light); }
  .s3 .stage-label { color: var(--stage3); border-color: var(--stage3); background: var(--amber-light); }
  .stage-count { font-size: 12px; color: var(--text-tertiary); }
  .stage-line { flex: 1; height: 1px; background: var(--border); }

  /* CUSTOMER GRID */
  .customer-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
    gap: 12px;
  }
  .customer-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
    display: flex; flex-direction: column; gap: 8px;
  }
  .customer-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); border-color: var(--border-strong); }
  .avatar {
    width: 38px; height: 38px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; flex-shrink: 0;
  }
  .s1 .avatar { background: var(--blue-light); color: var(--stage1); }
  .s2 .avatar { background: var(--green-light); color: var(--stage2); }
  .s3 .avatar { background: var(--amber-light); color: var(--stage3); }
  .c-name { font-size: 15px; font-weight: 700; color: var(--text-primary); }
  .c-meta { font-size: 12px; color: var(--text-tertiary); line-height: 1.6; }
  .progress-dots { display: flex; gap: 3px; margin-top: 2px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border-strong); }
  .dot.on { background: var(--stage1); }
  .s2 .dot.on { background: var(--stage2); }
  .s3 .dot.on { background: var(--stage3); }

  .add-card {
    background: none;
    border: 1.5px dashed var(--border-strong);
    border-radius: var(--radius);
    padding: 16px;
    cursor: pointer;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 6px;
    color: var(--text-tertiary);
    font-size: 12px;
    font-family: inherit;
    min-height: 110px;
    transition: border-color 0.15s, color 0.15s, background 0.15s;
  }
  .add-card:hover { border-color: var(--text-secondary); color: var(--text-secondary); background: var(--bg-secondary); }
  .add-card .plus { font-size: 22px; line-height: 1; font-weight: 300; }

  /* FORM PAGE */
  .form-wrapper { max-width: 960px; margin: 0 auto; padding: 24px 20px 60px; }
  .form-topbar {
    display: flex; align-items: center; gap: 12px; margin-bottom: 24px;
  }
  .back-btn {
    display: flex; align-items: center; gap: 6px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 7px 14px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s;
  }
  .back-btn:hover { background: var(--bg-secondary); }
  .form-topbar h2 { font-size: 18px; font-weight: 700; }

  .stage-toggle {
    display: inline-flex;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 3px;
    gap: 2px;
    margin-bottom: 20px;
  }
  .stg-btn {
    padding: 7px 16px;
    font-size: 12px;
    font-weight: 600;
    border: none;
    background: none;
    border-radius: 6px;
    cursor: pointer;
    color: var(--text-tertiary);
    font-family: inherit;
    transition: all 0.15s;
  }
  .stg-btn.active { background: var(--bg-card); color: var(--blue); box-shadow: var(--shadow); }

  .form-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 16px; }
  @media (max-width: 680px) { .form-grid { grid-template-columns: 1fr; } }

  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: var(--shadow);
  }
  .card + .card { margin-top: 14px; }
  .card-title {
    font-size: 13px; font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 14px;
    padding-left: 11px;
    border-left: 3px solid var(--blue);
    border-radius: 0;
  }
  .card-title.green { border-color: var(--green); }
  .card-title.purple { border-color: #7c5cbf; }
  .card-title.amber { border-color: var(--amber); }

  .card-dark {
    background: #1b2845;
    border-color: #2c3e5e;
  }
  .card-dark .card-title { color: #94afd4; border-color: #4a6fa5; }

  .field { margin-bottom: 14px; }
  .field:last-child { margin-bottom: 0; }
  .field label { display: block; font-size: 11px; font-weight: 700; color: var(--text-tertiary); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.06em; }
  .field input[type=text],
  .field input[type=date],
  .field textarea {
    width: 100%;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 9px 12px;
    font-size: 13px;
    color: var(--text-primary);
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .field input:focus, .field textarea:focus {
    border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(26,95,180,0.10);
    background: #fff;
  }
  .field textarea { min-height: 100px; resize: vertical; line-height: 1.6; }
  .card-dark .field input, .card-dark .field textarea {
    background: rgba(255,255,255,0.06);
    border-color: rgba(255,255,255,0.10);
    color: #c5d8f0;
  }
  .card-dark .field input:focus, .card-dark .field textarea:focus {
    border-color: #4a6fa5; background: rgba(255,255,255,0.09);
    box-shadow: 0 0 0 3px rgba(74,111,165,0.20);
  }
  .card-dark .field label { color: #6b8aad; }
  .card-dark .field input::placeholder,
  .card-dark .field textarea::placeholder { color: #4a5e7a; }

  /* CHECKBOXES */
  .check-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; }
  .check-item {
    display: flex; align-items: center; gap: 8px;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 9px 10px;
    cursor: pointer;
    font-size: 13px;
    color: var(--text-secondary);
    transition: all 0.15s;
    user-select: none;
  }
  .check-item:hover { border-color: var(--border-strong); color: var(--text-primary); }
  .check-item.on { background: var(--blue-light); border-color: rgba(26,95,180,0.25); color: var(--blue); }
  .chk-box {
    width: 17px; height: 17px; border-radius: 4px;
    border: 1.5px solid var(--border-strong);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.15s;
  }
  .check-item.on .chk-box { background: var(--blue); border-color: var(--blue); }
  .chk-mark { color: white; font-size: 10px; display: none; }
  .check-item.on .chk-mark { display: block; }

  /* TAGS */
  .tag-section { margin-bottom: 14px; }
  .tag-section:last-child { margin-bottom: 0; }
  .tag-section-label {
    font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em;
    color: var(--text-tertiary); margin-bottom: 7px;
  }
  .tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag {
    padding: 5px 13px;
    border-radius: 99px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid;
    transition: all 0.15s;
    user-select: none;
  }
  .tag.blue { background: var(--blue-light); border-color: rgba(26,95,180,0.2); color: var(--blue); }
  .tag.blue.on { background: var(--blue); color: white; border-color: var(--blue); }
  .tag.green { background: var(--green-light); border-color: rgba(14,125,90,0.2); color: var(--green); }
  .tag.green.on { background: var(--green); color: white; border-color: var(--green); }
  .tag.pink { background: #fbeaf0; border-color: rgba(160,60,100,0.2); color: #903050; }
  .tag.pink.on { background: #903050; color: white; border-color: #903050; }
  .tag.indigo { background: #eeedfe; border-color: rgba(83,74,183,0.2); color: #534AB7; }
  .tag.indigo.on { background: #534AB7; color: white; border-color: #534AB7; }
  .tag.purple { background: #f5f3ff; border-color: rgba(124,92,191,0.2); color: #7c5cbf; }
  .tag.purple.on { background: #7c5cbf; color: white; border-color: #7c5cbf; }

  /* FORM ACTIONS */
  .form-actions {
    display: flex; align-items: center; justify-content: flex-end;
    gap: 10px; margin-top: 20px; padding-top: 20px;
    border-top: 1px solid var(--border);
  }
  .form-actions-left { flex: 1; }
  .btn { padding: 9px 20px; font-size: 13px; font-weight: 600; border-radius: var(--radius-sm); cursor: pointer; font-family: inherit; transition: all 0.15s; }
  .btn-ghost { background: none; border: 1px solid var(--border); color: var(--text-secondary); }
  .btn-ghost:hover { background: var(--bg-secondary); }
  .btn-danger { background: none; border: 1px solid rgba(176,48,48,0.25); color: var(--red); }
  .btn-danger:hover { background: var(--red-light); }
  .btn-primary { background: var(--text-primary); border: none; color: white; }
  .btn-primary:hover { opacity: 0.85; }

  /* TOAST */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    padding: 11px 20px;
    border-radius: var(--radius-sm);
    font-size: 13px; font-weight: 600;
    color: white;
    box-shadow: var(--shadow-md);
    opacity: 0; pointer-events: none;
    transform: translateY(8px);
    transition: opacity 0.25s, transform 0.25s;
    z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  /* EMPTY */
  .empty { padding: 40px 20px; text-align: center; color: var(--text-tertiary); font-size: 13px; }

  /* SUMMARY BAR */
  .summary-bar {
    display: flex; gap: 10px; margin-bottom: 22px; flex-wrap: wrap;
  }
  .summary-chip {
    display: flex; align-items: center; gap: 7px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 7px 14px;
    font-size: 13px;
    box-shadow: var(--shadow);
  }
  .summary-chip .num { font-weight: 700; font-size: 16px; }
  .summary-chip .lbl { color: var(--text-tertiary); font-size: 11px; }
  .chip-dot { width: 8px; height: 8px; border-radius: 50%; }

  @media print { .no-print { display: none; } }
</style>
</head>
<body>

<header class="app-header no-print">
  <div class="app-logo">
    <div class="dot"></div>
    <h1>90天客戶跟進管理</h1>
  </div>
  <div class="header-actions">
    <span class="stats-pill" id="totalPill">共 0 位客戶</span>
  </div>
</header>

<!-- LIST PAGE -->
<div id="listPage" class="page active">
  <div class="list-content">
    <div class="summary-bar">
      <div class="summary-chip">
        <div class="chip-dot" style="background:var(--stage1)"></div>
        <span class="num" id="cnt0">0</span>
        <span class="lbl">1–30天</span>
      </div>
      <div class="summary-chip">
        <div class="chip-dot" style="background:var(--stage2)"></div>
        <span class="num" id="cnt1">0</span>
        <span class="lbl">31–60天</span>
      </div>
      <div class="summary-chip">
        <div class="chip-dot" style="background:var(--stage3)"></div>
        <span class="num" id="cnt2">0</span>
        <span class="lbl">61–90天</span>
      </div>
    </div>
    <div class="toolbar no-print">
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input class="search-input" type="text" placeholder="搜尋客戶姓名…" oninput="filterCustomers(this.value)">
      </div>
      <button class="btn-add" onclick="openNewCustomer(0)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
        新增客戶
      </button>
    </div>
    <div id="stageBlocks"></div>
  </div>
</div>

<!-- FORM PAGE -->
<div id="formPage" class="page">
  <div class="form-wrapper">
    <div class="form-topbar no-print">
      <button class="back-btn" onclick="goBack()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        返回列表
      </button>
      <h2 id="formTitle">客戶資料</h2>
    </div>

    <div class="stage-toggle no-print">
      <button class="stg-btn active" onclick="setStage(0,this)">1–30 天</button>
      <button class="stg-btn" onclick="setStage(1,this)">31–60 天</button>
      <button class="stg-btn" onclick="setStage(2,this)">61–90 天</button>
    </div>

    <div class="form-grid">
      <div>
        <div class="card">
          <div class="card-title">基本資料</div>
          <div class="field"><label>姓名</label><input type="text" id="f_name" placeholder="請輸入姓名"></div>
          <div class="field"><label>加入日期</label><input type="date" id="f_date"></div>
          <div class="field"><label>上線 DD</label><input type="text" id="f_dd" placeholder="上線 DD 姓名"></div>
        </div>
        <div class="card card-dark">
          <div class="card-title">加入初衷與原因</div>
          <div class="field">
            <label>動機與目標</label>
            <textarea id="f_reason" placeholder="紀錄當初加入的動機與目標…"></textarea>
          </div>
        </div>
      </div>
      <div>
        <div class="card">
          <div class="card-title">服務引導與基礎建設</div>
          <div class="check-grid" id="serviceChecks"></div>
        </div>
        <div class="card" style="margin-top:14px">
          <div class="card-title purple">參加的專業課程</div>
          <div class="tags" id="courseTags"></div>
        </div>
        <div class="card" style="margin-top:14px">
          <div class="card-title green">產品體驗紀錄</div>
          <div id="productTags"></div>
        </div>
      </div>
    </div>

    <div class="form-actions no-print">
      <div class="form-actions-left">
        <button class="btn btn-danger" id="deleteBtn" onclick="deleteCustomer()" style="display:none">刪除此客戶</button>
      </div>
      <button class="btn btn-ghost" onclick="goBack()">取消</button>
      <button class="btn btn-primary" onclick="saveCustomer()">儲存資料</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SERVICES = ['一對一 OPP','會場 OPP','與上手 DD 認識','參觀體驗館','營養評估','生命密碼','會自己訂貨','會用信用卡'];
const COURSES = ['健康管理45課程','寰宇菁英會','U+PLUS','海外特攻營','誓師大會','安麗年會','BTC','產品總導讀','百萬年薪俱樂部'];
const PRODUCTS = [
  { label:'家潔/個人護理', color:'blue', items:['SA8','LOC','洗碟精','金屬','金剛刷','牙膏','牙刷','蜜乳','浴露','蜂皂'] },
  { label:'營養保健',      color:'green', items:['魚油','VitC','酵素','鈣鎂','卵磷脂','營養早餐'] },
  { label:'美容護理',      color:'pink',  items:['染髮','潔膚','卸妝乳','抗皺','煥膚'] },
  { label:'高科技',        color:'indigo',items:['刮痧','淨水器','空氣清淨機','不沾鍋','金鍋'] }
];
const STAGE_NAMES = ['1–30 天','31–60 天','61–90 天'];
const STAGE_CLS   = ['s1','s2','s3'];

let customers = [];
let currentId = null;
let searchQ = '';

function loadData() {
  try { customers = JSON.parse(localStorage.getItem('crm90_v2') || '[]'); } catch(e) { customers = []; }
  if (!customers.length) {
    customers = [
      { id:1, name:'王小明', date:'2025-03-10', dd:'李大華', reason:'想改善健康狀況', stage:0,
        services:['一對一 OPP','與上手 DD 認識'], courses:['BTC'], products:['SA8','魚油'] },
      { id:2, name:'陳美玲', date:'2025-02-15', dd:'李大華', reason:'增加收入來源', stage:1,
        services:['一對一 OPP','會場 OPP','參觀體驗館','營養評估'], courses:['健康管理45課程','BTC'], products:['VitC','牙膏','浴露'] },
      { id:3, name:'林志偉', date:'2025-01-20', dd:'張三', reason:'事業發展', stage:2,
        services:SERVICES.slice(0,6), courses:['健康管理45課程','BTC','產品總導讀'], products:['魚油','VitC','酵素','SA8'] },
      { id:4, name:'黃淑芬', date:'2025-03-01', dd:'李大華', reason:'產品體驗', stage:0,
        services:['一對一 OPP'], courses:[], products:[] },
      { id:5, name:'吳建宏', date:'2025-02-28', dd:'張三', reason:'朋友介紹', stage:1,
        services:['一對一 OPP','會場 OPP'], courses:['誓師大會'], products:['SA8','LOC'] },
    ];
    saveData();
  }
}
function saveData() { localStorage.setItem('crm90_v2', JSON.stringify(customers)); }

function initials(name) { return name ? name.slice(0,2) : '??'; }

function progressDots(services) {
  const pct = SERVICES.length ? Math.round((services.length / SERVICES.length) * 8) : 0;
  let h = '';
  for (let i = 0; i < 8; i++) h += `<div class="dot${i<pct?' on':''}"></div>`;
  return h;
}

function renderList() {
  const filtered = searchQ ? customers.filter(c => c.name.includes(searchQ)) : customers;
  let html = '';
  for (let s = 0; s < 3; s++) {
    const group = filtered.filter(c => c.stage === s);
    html += `<div class="stage-block ${STAGE_CLS[s]}">
      <div class="stage-header">
        <span class="stage-label">${STAGE_NAMES[s]}</span>
        <span class="stage-count">${group.length} 位</span>
        <div class="stage-line"></div>
      </div>
      <div class="customer-grid">`;
    group.forEach(c => {
      html += `<div class="customer-card" onclick="openEdit(${c.id})">
        <div class="avatar">${initials(c.name)}</div>
        <div class="c-name">${c.name}</div>
        <div class="c-meta">${c.date||''}${c.dd?'<br>DD: '+c.dd:''}</div>
        <div class="progress-dots">${progressDots(c.services||[])}</div>
      </div>`;
    });
    html += `<button class="add-card no-print" onclick="openNewCustomer(${s})">
      <span class="plus">+</span><span>新增客戶</span>
    </button></div></div>`;
  }
  document.getElementById('stageBlocks').innerHTML = html;

  // summary
  for (let s=0;s<3;s++) document.getElementById('cnt'+s).textContent = customers.filter(c=>c.stage===s).length;
  document.getElementById('totalPill').textContent = '共 '+customers.length+' 位客戶';
}

function filterCustomers(q) { searchQ = q; renderList(); }

function openNewCustomer(stage) {
  currentId = null;
  document.getElementById('formTitle').textContent = '新增客戶';
  document.getElementById('deleteBtn').style.display = 'none';
  clearForm();
  setStageToggle(stage);
  buildFormUI({ stage, services:[], courses:[], products:[] });
  showForm();
}

function openEdit(id) {
  const c = customers.find(x => x.id === id);
  if (!c) return;
  currentId = id;
  document.getElementById('formTitle').textContent = c.name || '客戶資料';
  document.getElementById('deleteBtn').style.display = 'block';
  setStageToggle(c.stage||0);
  buildFormUI(c);
  document.getElementById('f_name').value = c.name||'';
  document.getElementById('f_date').value = c.date||'';
  document.getElementById('f_dd').value = c.dd||'';
  document.getElementById('f_reason').value = c.reason||'';
  showForm();
}

function showForm() {
  document.getElementById('listPage').classList.remove('active');
  document.getElementById('formPage').classList.add('active');
  window.scrollTo(0,0);
}

function goBack() {
  document.getElementById('formPage').classList.remove('active');
  document.getElementById('listPage').classList.add('active');
  renderList();
}

function setStageToggle(s) {
  document.querySelectorAll('.stg-btn').forEach((b,i) => b.classList.toggle('active', i===s));
}

function setStage(s, btn) {
  document.querySelectorAll('.stg-btn').forEach((b,i) => b.classList.toggle('active', i===s));
}

function clearForm() {
  ['f_name','f_date','f_dd','f_reason'].forEach(id => { const el=document.getElementById(id); if(el) el.value=''; });
}

function buildFormUI(data) {
  const sv = data.services||[], co = data.courses||[], pr = data.products||[];

  document.getElementById('serviceChecks').innerHTML = SERVICES.map(s => {
    const on = sv.includes(s);
    return `<div class="check-item${on?' on':''}" onclick="toggleCheck(this)">
      <div class="chk-box"><span class="chk-mark">✓</span></div>
      <span>${s}</span></div>`;
  }).join('');

  document.getElementById('courseTags').innerHTML = COURSES.map(c =>
    `<span class="tag purple${co.includes(c)?' on':''}" onclick="this.classList.toggle('on')">${c}</span>`
  ).join('');

  document.getElementById('productTags').innerHTML = PRODUCTS.map(g =>
    `<div class="tag-section">
      <div class="tag-section-label">${g.label}</div>
      <div class="tags">${g.items.map(item =>
        `<span class="tag ${g.color}${pr.includes(item)?' on':''}" onclick="this.classList.toggle('on')">${item}</span>`
      ).join('')}</div>
    </div>`
  ).join('');
}

function toggleCheck(el) { el.classList.toggle('on'); }

function getSelectedStage() {
  return [...document.querySelectorAll('.stg-btn')].findIndex(b => b.classList.contains('active'));
}

function saveCustomer() {
  const name = document.getElementById('f_name').value.trim();
  if (!name) { showToast('請填寫姓名', '#b03030'); return; }
  const data = {
    name,
    date: document.getElementById('f_date').value,
    dd: document.getElementById('f_dd').value.trim(),
    reason: document.getElementById('f_reason').value.trim(),
    stage: getSelectedStage(),
    services: [...document.querySelectorAll('#serviceChecks .check-item.on')].map(el => el.querySelector('span').textContent),
    courses:  [...document.querySelectorAll('#courseTags .tag.on')].map(el => el.textContent),
    products: [...document.querySelectorAll('#productTags .tag.on')].map(el => el.textContent),
  };
  if (currentId) {
    const idx = customers.findIndex(c => c.id === currentId);
    customers[idx] = { ...customers[idx], ...data };
  } else {
    const newId = customers.length ? Math.max(...customers.map(c=>c.id))+1 : 1;
    customers.push({ id: newId, ...data });
  }
  saveData();
  showToast('已儲存 ✓');
  setTimeout(goBack, 700);
}

function deleteCustomer() {
  if (!currentId) return;
  if (!confirm('確定要刪除此客戶的所有資料？')) return;
  customers = customers.filter(c => c.id !== currentId);
  saveData();
  showToast('已刪除');
  setTimeout(goBack, 500);
}

function showToast(msg, color) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = color || '#0e7d5a';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

loadData();
renderList();
</script>
</body>
</html>
