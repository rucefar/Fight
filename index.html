<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WinPlus+ | Digital Growth System</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>
body {
  margin:0;
  font-family:'Noto Sans TC';
  background:#f4f1ea;
}

.center {
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card {
  background:#fff;
  padding:40px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
  text-align:center;
}

.nav {
  position:fixed;
  top:0;
  width:100%;
  background:#1e1e1e;
  color:#fff;
  display:flex;
  padding:10px;
  align-items:center;
}

.nav span {
  margin-right:15px;
}

.btn {
  padding:8px 16px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.main {
  padding-top:60px;
  text-align:center;
}

.status {
  font-size:12px;
  opacity:0.8;
}

</style>
</head>

<body>

<!-- 登入 -->
<div id="login" class="center">
  <div class="card">
    <h2>WinPlus+</h2>
    <div id="google-btn"></div>
    <p id="login-error"></p>
  </div>
</div>

<!-- 主畫面 -->
<div id="app" style="display:none;">
  <div class="nav">
    <span>WinPlus+</span>
    <span id="user"></span>
    <span id="cloud" class="status">☁️ 未同步</span>
    <button class="btn" onclick="logout()">登出</button>
  </div>

  <div class="main">
    <h1>你的成長系統已啟動 🚀</h1>
    <p>開始記錄與累積你的戰果</p>

    <textarea id="note" style="width:80%;height:200px;"></textarea>
  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithCredential, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyArBQTUSpEk2VfLMSe1lLDbhBDNEzZJgtA",
  authDomain: "winplus-6fe62.firebaseapp.com",
  projectId: "winplus-6fe62",
  storageBucket: "winplus-6fe62.appspot.com",
  messagingSenderId: "635721093721",
  appId: "1:635721093721:web:12d24d7025514608335748"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let uid = null;

// Google登入
window.handleCredentialResponse = async (resp) => {
  const cred = GoogleAuthProvider.credential(resp.credential);
  await signInWithCredential(auth, cred);
};

window.addEventListener("load", () => {
  if (window.google) {
    google.accounts.id.initialize({
      client_id: "635721093721-ebdobeukugpou646db9kt6ij873ejorb.apps.googleusercontent.com",
      callback: handleCredentialResponse
    });

    google.accounts.id.renderButton(
      document.getElementById("google-btn"),
      { theme: "outline", size: "large" }
    );

    google.accounts.id.prompt();
  }
});

// 登入狀態
onAuthStateChanged(auth, async (user) => {
  if (user) {
    uid = user.uid;

    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "block";
    document.getElementById("user").textContent = user.displayName;

    loadData();
  }
});

// 存資料
async function saveData() {
  if (!uid) return;

  const status = document.getElementById("cloud");
  status.textContent = "☁️ 同步中...";

  await setDoc(doc(db, "users", uid), {
    note: document.getElementById("note").value
  });

  status.textContent = "✅ 已同步";
}

// 讀資料
async function loadData() {
  const ref = doc(db, "users", uid);
  const snap = await getDoc(ref);

  if (snap.exists()) {
    document.getElementById("note").value = snap.data().note || "";
  }
}

// 自動存
setInterval(saveData, 10000);

// 登出
window.logout = () => {
  signOut(auth);
  location.reload();
};

</script>

</body>
</html>
